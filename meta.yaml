package:
  name: eba3
  version: "3.0.0"

source:
  path: .

build:
  number: 0
  noarch: generic

requirements:
  build:
    - make
  host:
    - perl >=5.32.1
    - perl-math-round
    - perl-list-compare
  run:
    - perl >=5.32.1
    - perl-math-round
    - perl-list-compare

test:
  commands:
    - EBA.pl -h || true

about:
  home: https://bioinformaticsonline.com
  license: Other
  license_file: LICENSE
  summary: "Evolutionary Breakpoints Analyser (EBA v3.0) - automated detection and classification of Evolutionary Breakpoint Regions"
  description: |
    EBA (Evolutionary Breakpoints Analyser) is a Perl-based pipeline that
    automatically defines, classifies, and scores Evolutionary Breakpoint
    Regions (EBRs) from pairwise synteny data across multiple genomes.
    It operates at multiple resolutions simultaneously and uses a phylogenetic
    classification to assign breakpoints to evolutionary branches.

    Usage:
      perl EBA.pl -n <n_species> -d <input_dir> -r <reference> -p <prime_resolution>
                  -t <threshold> -c classification.eba -chr chr_size.txt -o <outdir> -k

    Note: GD/GDGraph visualizations are optional. The core analysis pipeline
    runs fully without them. Install perl-gd and perl-gdgraph separately if
    you need graphical output on a supported platform.
  doc_url: https://bioinformaticsonline.com
  dev_url: https://github.com/pranjalpruthi/eba3

extra:
  recipe-maintainers:
    - pranjalpruthi
    - jitendralab
